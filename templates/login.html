<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKIN CANCER APP - Connexion</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        /* Custom soft green background for a medical application feel */
        body {
            background-color: #f2f8f5;
        }
        .btn-success {
            background-color: #198754;
            border-color: #198754;
        }
        .btn-success:hover {
            background-color: #146c43;
            border-color: #13653f;
        }
        .text-success-custom {
            color: #198754;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-6 col-lg-4">
                
                <div class="card shadow border-0 rounded-3">
                    <div class="card-body p-4">
                        
                        <div class="text-center mb-4">
                            <div class="display-4 text-success-custom mb-2">
                                <i class="bi bi-shield-plus"></i> </div>
                            <h3 class="fw-bold text-secondary text-uppercase tracking-wide" style="font-size: 1.25rem;">Skin Cancer App</h3>
                        </div>
                        {% if success %}
                        <div class="alert alert-success" role="alert">
                            {{ success }}
                        </div>
                        {% endif %}
                        {% if error %}
                        <div class="alert alert-danger" role="alert">
                            {{ error }}
                        </div>
                        {% endif %}

                        <form action="{{ url_for('login') }}" method="POST" class="needs-validation" novalidate>
                            
                            <div class="mb-3">
                                <label for="username" class="form-label text-muted small fw-bold">Nom d'utilisateur</label>
                                <input type="text" class="form-control" id="username" name="username" placeholder="Entrez votre nom d'utilisateur" required>
                                <div class="invalid-feedback">
                                    Veuillez entrer votre nom d'utilisateur.
                                </div>
                            </div>
                            
                            <div class="mb-2">
                                <label for="password" class="form-label text-muted small fw-bold">Mot de passe</label>
                                <input type="password" class="form-control" id="password" name="password" placeholder="Entrez votre mot de passe" required>
                                <div class="invalid-feedback">
                                    Veuillez entrer votre mot de passe.
                                </div>
                            </div>
                            
                            <div class="text-end mb-4">
                                <a href="{{ url_for('forgot_password') }}" class="text-decoration-none small text-success-custom">Mot de passe oublié ?</a>
                            </div>
                            
                            <div class="d-grid gap-2 mb-3">
                                <button type="submit" class="btn btn-success py-2 fw-bold">Se connecter</button>
                            </div>
                            
                            <div class="text-center mt-4">
                                <p class="text-muted small mb-0">Pas encore de compte ? 
                                    <a href="{{ url_for('register') }}" class="text-success-custom fw-bold text-decoration-none">S'inscrire</a>
                                </p>
                            </div>
                            
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

    <script>
        (() => {
          'use strict'
          // Fetch all the forms we want to apply custom Bootstrap validation styles to
          const forms = document.querySelectorAll('.needs-validation')

          // Loop over them and prevent submission if fields are invalid
          Array.from(forms).forEach(form => {
            form.addEventListener('submit', event => {
              if (!form.checkValidity()) {
                event.preventDefault()
                event.stopPropagation()
              }
              form.classList.add('was-validated')
            }, false)
          })
        })()
    </script>
</body>
</html>
